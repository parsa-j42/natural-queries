name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'natural-queries-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'natural-queries-backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: natural-queries-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Lint
        run: uv run ruff check app tests

      # The etl group is needed because tests/test_etl.py imports the ETL code.
      # All tests run offline (providers are mocked), so no API keys are required.
      - name: Test
        run: uv run --group etl pytest -q
