name: Deploy
on:
  push:
    branches:
      - main
    paths:
      - 'natural-queries-frontend/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

defaults:
  run:
    working-directory: natural-queries-frontend

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build project
        env:
          # Base URL of the deployed backend. Set a repo Actions variable named
          # VITE_API_URL (Settings -> Secrets and variables -> Actions -> Variables)
          # to the Render URL. If unset, the app falls back to localhost.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      # Pull the Parquet data (gitignored, served as static assets) from a GitHub
      # Release into the build output. Create it once with:
      #   gh release create data-v1 natural-queries-frontend/public/data/*.parquet
      # Tolerant on purpose: if the release is missing the site still deploys,
      # just without data, so this never breaks the frontend deploy.
      - name: Fetch Parquet data
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist/data
          gh release download data-v1 \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist/data \
            --pattern '*.parquet' \
            --clobber \
            || echo "No data-v1 release found; deploying without data."

      - name: Setup 404 page
        run: cp dist/index.html dist/404.html

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: ./natural-queries-frontend/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
