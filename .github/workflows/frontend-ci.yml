name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'natural-queries-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'natural-queries-frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: natural-queries-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: natural-queries-frontend/yarn.lock

      - name: Install
        run: |
          corepack enable
          yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      # Unit/component tests only. The Playwright E2E suite needs a browser
      # download and the Parquet data, so it is run locally, not in CI.
      - name: Unit tests
        run: yarn test
